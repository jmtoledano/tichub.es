## Configuración de Cloudflare Pages para tichub.es.
## El build en sí lo sigue haciendo Pages vía integración con git (ver README:
## build command `npm run build`, output `dist`) — este fichero solo declara
## el binding de envío de correo que usa functions/api/demo.ts.

pages_build_output_dir = "dist"

# Envía correos a través de Cloudflare Email Routing (ya activo para tichub.es).
# "contacto@tichub.es" debe ser un destino verificado en Email Routing — lo es,
# porque ya reenvías el correo de esa dirección desde ahí.
[[send_email]]
name = "EMAIL"
destination_address = "contacto@tichub.es"
