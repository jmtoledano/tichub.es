name = "tichub-email-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
# Necesario porque "mimetext" usa internamente módulos de Node ("path", "node:os").
compatibility_flags = ["nodejs_compat"]
# Sin URL pública: solo se llama desde tichub.es vía Service Binding (EMAIL_WORKER),
# nunca directamente por internet.
workers_dev = false

# Envía correos a través de Cloudflare Email Routing (ya activo para tichub.es).
# El binding exige la dirección VERIFICADA de Email Routing (la bandeja real a la
# que reenvía la regla), no el alias "contacto@tichub.es" — ese alias solo redirige
# a jose@baudes.es, que es la dirección que Cloudflare tiene verificada.
# Este binding solo existe para Workers independientes, no para Pages Functions
# — por eso este envío vive en su propio Worker en vez de en functions/api/demo.ts.
[[send_email]]
name = "EMAIL"
destination_address = "jose@baudes.es"

# Activado desde el dashboard para poder ver los logs de envío (Observabilidad →
# En vivo) mientras diagnosticamos el fallo del envío. Fijado aquí para que no se
# pierda en el próximo despliegue.
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
